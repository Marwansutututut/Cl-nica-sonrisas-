<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Clara - Experiencia Inmersiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --accent: #ffffff;
            --gray-muted: #71717a;
            --primary: #3b82f6;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .font-serif { font-family: 'Playfair+Display', serif; }

        .section {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: white;
            color: black;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .streak-fire {
            background: linear-gradient(to right, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .applied-badge {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
        }

        .ambient-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            filter: blur(40px);
        }

        .immersive-mode { background-color: #000; }
        .immersive-mode .ui-hide { opacity: 0; pointer-events: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="ambient-glow" id="glow"></div>

    <!-- Audio de Fondo (Canción solicitada) -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-deep-urban-623.mp3" type="audio/mpeg">
    </audio>

    <!-- NAVEGACIÓN -->
    <nav class="fixed top-0 w-full p-6 md:p-10 flex justify-between items-center z-50 ui-hide transition-opacity duration-500">
        <div class="text-xl font-serif tracking-widest cursor-pointer" onclick="showSection('hero')">MENTE CLARA</div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-[10px] uppercase opacity-40 tracking-widest">Racha de Acción</span>
                <span class="streak-fire font-bold" id="streakVal">0 Días</span>
            </div>
            <button onclick="showSection('library')" class="p-2 hover:bg-white/5 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- 1. PANTALLA PRINCIPAL (HERO) -->
    <section id="hero" class="section flex flex-col items-center text-center max-w-2xl">
        <div class="mb-6 opacity-40 text-xs uppercase tracking-[0.4em]">Estrategia del día</div>
        <h1 id="hero-phrase" class="text-3xl md:text-5xl font-serif italic mb-12 leading-tight px-4">
            "No es la idea más brillante la que gana, es la que se ejecuta mejor."
        </h1>
        <button onclick="showSection('daily')" class="btn-primary">Aprende de esto hoy</button>
    </section>

    <!-- 2. REFLEXIÓN DIARIA -->
    <section id="daily" class="section hidden flex flex-col items-center text-center max-w-xl px-4">
        <div id="category-tag" class="mb-4 text-blue-400 uppercase tracking-widest text-[10px] font-bold">Estrategia</div>
        <p id="daily-text" class="text-xl md:text-2xl font-light leading-relaxed mb-10 text-zinc-200">
            Cargando lección...
        </p>
        
        <div class="flex flex-wrap justify-center gap-4 mb-12 ui-hide">
            <button onclick="markApplied()" id="applyBtn" class="btn-action flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                Marcar como aplicada
            </button>
            <button onclick="toggleMusic()" id="musicBtn" class="btn-action flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
                Música ON
            </button>
        </div>

        <div class="flex gap-6 opacity-40 text-xs uppercase tracking-widest ui-hide">
            <button onclick="showSection('hero')" class="hover:text-white transition">Volver al inicio</button>
            <button onclick="showSection('library')" class="hover:text-white transition">Ir a biblioteca</button>
        </div>
    </section>

    <!-- 3. BIBLIOTECA -->
    <section id="library" class="section hidden w-full max-w-5xl px-4 py-32 overflow-y-auto h-screen">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-serif">Biblioteca</h2>
            <div class="flex gap-2 flex-wrap justify-end">
                <button onclick="filterLibrary('all')" class="text-[10px] uppercase border border-white/10 px-3 py-1 rounded-full hover:bg-white/10">Todo</button>
                <button onclick="filterLibrary('Estrategia')" class="text-[10px] uppercase border border-white/10 px-3 py-1 rounded-full hover:bg-white/10">Estrategia</button>
                <button onclick="filterLibrary('Liderazgo')" class="text-[10px] uppercase border border-white/10 px-3 py-1 rounded-full hover:bg-white/10">Liderazgo</button>
                <button onclick="filterLibrary('Marketing')" class="text-[10px] uppercase border border-white/10 px-3 py-1 rounded-full hover:bg-white/10">Marketing</button>
                <button onclick="filterLibrary('Finanzas')" class="text-[10px] uppercase border border-white/10 px-3 py-1 rounded-full hover:bg-white/10">Finanzas</button>
            </div>
        </div>
        <div id="library-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-20"></div>
    </section>

    <div id="exitImmersive" class="fixed bottom-10 opacity-0 transition-opacity duration-700 pointer-events-none z-50">
        <button onclick="exitImmersive()" class="text-[10px] uppercase tracking-[0.4em] opacity-30 hover:opacity-100">Click para volver al mundo real</button>
    </div>

    <div id="toast" class="fixed bottom-10 bg-white text-black px-6 py-3 rounded-xl shadow-2xl font-bold text-sm transform translate-y-32 transition-transform duration-500 z-[100]">
        Acción registrada.
    </div>

    <script>
        const database = [
            { id: 1, category: 'Estrategia', phrase: "Ejecución sobre idea.", content: "La parálisis por análisis es el cementerio de las grandes empresas. Mañana tendrás más información, pero hoy tienes la oportunidad de ser el primero. Ejecuta lo mínimo viable ahora mismo." },
            { id: 2, category: 'Liderazgo', phrase: "Crea líderes, no seguidores.", content: "Delega responsabilidad, no solo tareas. Si tu equipo no puede decidir sin ti, tienes un autoempleo, no un negocio. Empodera a tu gente hoy." },
            { id: 3, category: 'Marketing', phrase: "Nicho sobre masa.", content: "Si le hablas a todo el mundo, no le hablas a nadie. Encuentra tu nicho. Es mejor ser el referente de un sector pequeño que una opción irrelevante." },
            { id: 4, category: 'Mentalidad', phrase: "Fracaso como dato.", content: "Cada error es información gratuita. Itera rápido, aprende más rápido. El éxito es la suma de fallos inteligentes analizados con frialdad." },
            { id: 5, category: 'Productividad', phrase: "Ley de Pareto.", content: "Elimina las reuniones de una hora que podrían ser un mensaje corto. Enfócate exclusivamente en el veinte por ciento que genera el ochenta por ciento de tus ingresos." },
            { id: 6, category: 'Ventas', phrase: "Escucha más, habla menos.", content: "El mejor vendedor no es el que más habla, sino el que mejores preguntas hace. Entiende el dolor de tu cliente antes de ofrecer la medicina." },
            { id: 7, category: 'Finanzas', phrase: "Caja es reina.", content: "La facturación es vanidad, el beneficio es sanidad, pero la caja es la realidad. Nunca te quedes sin liquidez por perseguir un crecimiento ficticio." },
            { id: 8, category: 'Estrategia', phrase: "Ventaja competitiva.", content: "Si no tienes una ventaja competitiva, no compitas. Busca lo que te hace único y explótalo hasta que sea tu firma personal en el mercado." },
            { id: 9, category: 'Liderazgo', phrase: "Contrata lento, despide rápido.", content: "Una mala contratación puede destruir la cultura de tu empresa. Tómate el tiempo para encontrar el talento adecuado, pero actúa sin dudar si alguien resta." },
            { id: 10, category: 'Marketing', phrase: "Prueba social.", content: "La gente no compra lo que haces, compra lo que otros dicen que haces. Consigue testimonios reales y utilízalos como tu mejor herramienta de venta." },
            { id: 11, category: 'Productividad', phrase: "Bloques de tiempo.", content: "La multitarea es un mito que destruye la calidad. Divide tu día en bloques de enfoque profundo. Una tarea a la vez, con toda tu capacidad." },
            { id: 12, category: 'Estrategia', phrase: "Océano Azul.", content: "No intentes ganar a tus competidores en su propio juego. Crea un nuevo mercado donde la competencia sea irrelevante. Innova en el valor." },
            { id: 13, category: 'Finanzas', phrase: "Diversificación de ingresos.", content: "Depender de un solo cliente es una sentencia de muerte a largo plazo. Busca al menos tres fuentes de ingresos independientes para estabilizar tu negocio." },
            { id: 14, category: 'Ventas', phrase: "Seguimiento implacable.", content: "La mayoría de las ventas se cierran después del quinto contacto. No te rindas al primer 'no'. La persistencia profesional genera confianza." },
            { id: 15, category: 'Liderazgo', phrase: "Cultura sobre estrategia.", content: "La cultura organizacional se desayuna a la estrategia. Si tu equipo no cree en la misión, ningún plan brillante funcionará en la práctica." },
            { id: 16, category: 'Marketing', phrase: "Storytelling.", content: "Los datos informan, pero las historias venden. Conecta emocionalmente con tu audiencia contando el 'por qué' detrás de tu producto o servicio." },
            { id: 17, category: 'Productividad', phrase: "Dí 'No' a menudo.", content: "Cada vez que dices 'sí' a algo que no es prioritario, le estás diciendo 'no' a tus metas reales. Protege tu tiempo como tu activo más valioso." },
            { id: 18, category: 'Estrategia', phrase: "Pivota con datos.", content: "No te enamores de tu idea inicial. Si el mercado te da señales claras de cambio, pivota. La flexibilidad es la clave de la supervivencia empresarial." },
            { id: 19, category: 'Finanzas', phrase: "Gasto hormiga corporativo.", content: "Revisa tus suscripciones y costes fijos cada mes. Lo que no se mide, no se controla. Lo que no se controla, se desperdicia." },
            { id: 20, category: 'Ventas', phrase: "Vende beneficios, no funciones.", content: "A tu cliente no le importa cómo funciona tu software, le importa cuánto tiempo o dinero le va a ahorrar. Habla su idioma, no el tuyo." },
            { id: 21, category: 'Liderazgo', phrase: "Humildad intelectual.", content: "Rodéate de personas más inteligentes que tú. El papel del líder no es tener todas las respuestas, sino hacer las preguntas correctas." },
            { id: 22, category: 'Marketing', phrase: "Consistencia de marca.", content: "La marca no es un logo, es una promesa cumplida repetidamente. Asegúrate de que cada punto de contacto con el cliente refuerce esa promesa." },
            { id: 23, category: 'Productivity', phrase: "Regla de los 2 minutos.", content: "Si una tarea toma menos de dos minutos, hazla inmediatamente. No permitas que las pequeñas tareas saturen tu lista de pendientes mental." },
            { id: 24, category: 'Estrategia', phrase: "Escalabilidad.", content: "Si tu negocio depende de tu presencia física constante, tienes un trabajo de lujo. Diseña procesos que permitan que el negocio crezca sin ti." },
            { id: 25, category: 'Finanzas', phrase: "Fondo de emergencia.", content: "Un negocio sin reservas es un negocio con miedo. Mantén al menos seis meses de costes operativos en reserva para tomar decisiones con calma." },
            { id: 26, category: 'Ventas', phrase: "Urgencia real.", content: "Las ofertas eternas no funcionan. Crea una escasez o urgencia real para motivar la decisión de compra. El tiempo es el mejor cerrador." },
            { id: 27, category: 'Liderazgo', phrase: "Comunicación radical.", content: "Sé claro, no amable. La falta de claridad genera confusión y resentimiento. La honestidad directa, con respeto, acelera todos los procesos." },
            { id: 28, category: 'Marketing', phrase: "Email Marketing.", content: "Tu lista de correos es el único activo que posees en internet. Las redes sociales son prestadas. Construye una relación directa con tu audiencia." },
            { id: 29, category: 'Productividad', phrase: "Mañanas de enfoque.", content: "Haz lo más difícil y productivo en las primeras dos horas de tu día. El resto de la jornada es para gestionar lo que otros necesitan de ti." },
            { id: 30, category: 'Estrategia', phrase: "Analiza a la competencia.", content: "No para copiar, sino para diferenciarte. Entiende qué están ignorando y conviértelo en tu principal propuesta de valor." },
            { id: 31, category: 'Finanzas', phrase: "Precio por valor.", content: "No fijes precios basados en tus costes, sino en el valor que el cliente percibe. El precio bajo es una carrera hacia el fondo donde nadie gana." },
            { id: 32, category: 'Ventas', phrase: "Test de objeciones.", content: "Anticipa las dudas de tu cliente y respóndelas antes de que las formule. Transmitir seguridad ante las dudas es la clave del cierre." },
            { id: 33, category: 'Liderazgo', phrase: "Reconocimiento público.", content: "Elogia en público y corrige en privado. El reconocimiento es el combustible del talento. Hazlo específico y sincero." },
            { id: 34, category: 'Marketing', phrase: "Inbound Marketing.", content: "Deja de perseguir a tus clientes. Crea contenido que resuelva sus problemas y ellos vendrán a ti buscando tu solución profesional." },
            { id: 35, category: 'Productividad', phrase: "Desconexión total.", content: "La creatividad requiere aburrimiento y espacio. Desconecta del trabajo al menos un día a la semana para que tu cerebro genere nuevas ideas." },
            { id: 36, category: 'Estrategia', phrase: "Networking estratégico.", content: "Tu red de contactos es tu valor neto. No busques qué puedes obtener, busca cómo puedes ayudar primero. Las relaciones sólidas abren puertas cerradas." },
            { id: 37, category: 'Finanzas', phrase: "Apalancamiento.", content: "Usa el dinero, el talento o la tecnología de otros para multiplicar tus resultados. No intentes hacerlo todo solo; el apalancamiento crea riqueza." },
            { id: 38, category: 'Ventas', phrase: "El poder del silencio.", content: "Después de presentar el precio, cállate. El primero que habla después del precio suele perder su posición de fuerza. Deja que el cliente procese." },
            { id: 39, category: 'Liderazgo', phrase: "Misión compartida.", content: "Si quieres construir un barco, no pidas madera; haz que tu equipo anhele la inmensidad del mar. Inspira con un propósito mayor." },
            { id: 40, category: 'Marketing', phrase: "Ciclo de vida del cliente.", content: "Es mucho más barato venderle a un cliente actual que conseguir uno nuevo. Enfócate en la post-venta y en maximizar el valor de por vida." }
        ];

        let state = {
            currentId: 1,
            racha: parseInt(localStorage.getItem('racha')) || 0,
            aplicadas: JSON.parse(localStorage.getItem('aplicadas')) || [],
            lastActionDate: localStorage.getItem('lastDate') || null,
            musicPlaying: false,
            audioPromise: null
        };

        const bgMusic = document.getElementById('bgMusic');

        window.onload = () => {
            updateUIState();
            renderLibrary();
            window.addEventListener('mousemove', (e) => {
                const glow = document.getElementById('glow');
                glow.style.left = (e.clientX - 200) + 'px';
                glow.style.top = (e.clientY - 200) + 'px';
            });
            bgMusic.volume = 0.3;
        };

        async function playMusicSafely() {
            try {
                if (state.audioPromise) await state.audioPromise;
                state.audioPromise = bgMusic.play();
                await state.audioPromise;
                state.musicPlaying = true;
                document.getElementById('musicBtn').innerText = "Música ON";
                state.audioPromise = null;
            } catch (error) {
                if (error.name !== 'AbortError') console.error("Audio Error:", error);
                state.audioPromise = null;
            }
        }

        async function pauseMusicSafely() {
            if (state.audioPromise) {
                try { await state.audioPromise; } catch (e) {}
            }
            bgMusic.pause();
            state.musicPlaying = false;
            document.getElementById('musicBtn').innerText = "Música OFF";
            state.audioPromise = null;
        }

        function toggleMusic() {
            if (state.musicPlaying) pauseMusicSafely();
            else playMusicSafely();
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => {
                s.classList.add('hidden');
                s.style.opacity = '0';
            });
            const active = document.getElementById(id);
            active.classList.remove('hidden');
            setTimeout(() => active.style.opacity = '1', 50);

            if(id === 'daily') {
                loadDaily(state.currentId);
                // Iniciar música automáticamente al entrar en la lección
                if(!state.musicPlaying) playMusicSafely();
            }
        }

        function loadDaily(id) {
            const item = database.find(d => d.id === id);
            document.getElementById('daily-text').innerText = item.content;
            document.getElementById('category-tag').innerText = item.category;
            
            const isDone = state.aplicadas.includes(id);
            const btn = document.getElementById('applyBtn');
            btn.innerHTML = isDone ? '✓ Aplicada' : 'Marcar como aplicada';
            btn.style.borderColor = isDone ? '#10b981' : '';
        }

        function markApplied() {
            if(!state.aplicadas.includes(state.currentId)) {
                state.aplicadas.push(state.currentId);
                const today = new Date().toDateString();
                if(state.lastActionDate !== today) {
                    state.racha++;
                    state.lastActionDate = today;
                }
                saveState();
                updateUIState();
                showToast("Acción registrada. Racha actualizada.");
                loadDaily(state.currentId);
                renderLibrary();
            }
        }

        function saveState() {
            localStorage.setItem('racha', state.racha);
            localStorage.setItem('aplicadas', JSON.stringify(state.aplicadas));
            localStorage.setItem('lastDate', state.lastActionDate);
        }

        function updateUIState() {
            document.getElementById('streakVal').innerText = `${state.racha} Días`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.transform = 'translateY(0)';
            setTimeout(() => t.style.transform = 'translateY(150px)', 3000);
        }

        function renderLibrary(filter = 'all') {
            const grid = document.getElementById('library-grid');
            grid.innerHTML = '';
            const items = filter === 'all' ? database : database.filter(d => d.category === filter);
            
            items.forEach(item => {
                const isDone = state.aplicadas.includes(item.id);
                const card = document.createElement('div');
                card.className = "p-6 border border-white/10 rounded-2xl hover:bg-white/5 transition cursor-pointer flex flex-col justify-between h-40 group";
                card.onclick = () => {
                    state.currentId = item.id;
                    showSection('daily');
                };
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] uppercase tracking-widest text-blue-400 font-bold">${item.category}</span>
                            ${isDone ? '<span class="applied-badge">✓</span>' : ''}
                        </div>
                        <h3 class="text-base font-medium leading-snug group-hover:text-blue-400 transition">${item.phrase}</h3>
                    </div>
                    <div class="text-[10px] opacity-30">Lección #${item.id}</div>
                `;
                grid.appendChild(card);
            });
        }

        function filterLibrary(cat) { renderLibrary(cat); }

        function enterImmersive() {
            document.body.classList.add('immersive-mode');
            document.getElementById('exitImmersive').style.opacity = '1';
            document.getElementById('exitImmersive').style.pointerEvents = 'auto';
        }

        function exitImmersive() {
            document.body.classList.remove('immersive-mode');
            document.getElementById('exitImmersive').style.opacity = '0';
            document.getElementById('exitImmersive').style.pointerEvents = 'none';
        }
    </script>
</body>
</html>
